<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi Cafe - Order via WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-orange-500 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Desi Cafe</h1>
            <button onclick="toggleCart()" class="bg-white text-orange-500 px-4 py-2 rounded-full font-bold">
                🛒 Cart (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 mb-20">
        <h2 class="text-xl font-bold mb-4 border-b-2 border-orange-200 pb-2">Most Popular</h2>
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-end z-50">
        <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Your Order</h3>
                <button onclick="toggleCart()" class="text-red-500 font-bold">Close X</button>
            </div>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            <hr class="mb-4">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total:</span>
                <span>₹<span id="cart-total">0</span></span>
            </div>
            <input id="user-name" type="text" placeholder="Your Name" class="w-full border p-3 rounded mb-3">
            <textarea id="user-address" placeholder="Your Address / Table Number" class="w-full border p-3 rounded mb-4"></textarea>
            <button onclick="sendToWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-lg text-lg transition">
                Order via WhatsApp ✅
            </button>
        </div>
    </div>

    <script>
        const menu = [
            { id: 1, name: "Masala Chai", price: 30, desc: "Strong ginger & cardamom tea." },
            { id: 2, name: "Paneer Tikka Sandwich", price: 120, desc: "Grilled sandwich with spicy paneer." },
            { id: 3, name: "Peri Peri Maggi", price: 70, desc: "Classic Maggi with a spicy twist." },
            { id: 4, name: "Cold Coffee", price: 90, desc: "Frothy, thick, and chilled." }
        ];

        let cart = [];

        function displayMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menu.map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-lg">${item.name}</h4>
                        <p class="text-gray-500 text-sm">${item.desc}</p>
                        <p class="text-orange-600 font-bold mt-1">₹${item.price}</p>
                    </div>
                    <button onclick="addToCart(${item.id})" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-lg font-bold hover:bg-orange-500 hover:text-white transition">ADD</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menu.find(i => i.id === id);
            cart.push(item);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItems = document.getElementById('cart-items');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            cartItems.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between text-sm">
                    <span>${item.name}</span>
                    <span class="font-bold">₹${item.price}</span>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = total;
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        function sendToWhatsApp() {
            const name = document.getElementById('user-name').value;
            const address = document.getElementById('user-address').value;
            const total = document.getElementById('cart-total').innerText;

            if (!name || !address || cart.length === 0) {
                alert("Please add items and fill details!");
                return;
            }

            const phone = "91XXXXXXXXXX"; // REPLACED WITH CAFE OWNER'S NUMBER
            let message = `*NEW ORDER - Desi Cafe*%0A%0A`;
            message += `*Name:* ${name}%0A`;
            message += `*Address:* ${address}%0A%0A`;
            message += `*Items:*%0A`;
            cart.forEach(item => { message += `- ${item.name} (₹${item.price})%0A`; });
            message += `%0A*Total Amount: ₹${total}*`;

            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }

        displayMenu();
    </script>
</body>
</html>
